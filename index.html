<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storefront — E-Commerce Analytics</title>
  <meta name="description" content="Live E-Commerce Analytics Dashboard. Deine Zahlen, in Echtzeit." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/projekt-3/assets/main-B-n9rGRu.js"></script>
  <link rel="modulepreload" crossorigin href="/projekt-3/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/projekt-3/assets/main-BFZ7EnDI.css">
</head>
<body>

  <!-- Background -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Nav -->
  <nav class="landing-nav">
    <div class="nav-logo">
      <span class="logo-mark"></span>
      <span class="logo-text">Storefront</span>
    </div>
    <div class="nav-right">
      <button class="nav-lang" id="lang-toggle" aria-label="Sprache wechseln">
        <span id="lang-label">EN</span>
      </button>
      <button class="nav-theme" id="theme-toggle" aria-label="Theme wechseln">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <a href="./app.html" class="nav-cta" data-i18n="cta">Dashboard öffnen</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">

    <!-- Left: Text -->
    <div class="hero-text">
      <div class="hero-eyebrow">
        <span class="live-dot"></span>
        <span data-i18n="eyebrow">Live Analytics · Simuliert</span>
      </div>

      <h1 class="hero-headline" data-i18n="headline">
        Jede Zahl,<br>die zählt.
      </h1>

      <p class="hero-sub" data-i18n="sub">
        Ein interaktives E-Commerce Dashboard mit Echtzeit-Daten,
        KPI-Tracking und vollständiger Datenvisualisierung.
      </p>

      <div class="hero-actions">
        <a href="./app.html" class="btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
          <span data-i18n="cta">Dashboard öffnen</span>
        </a>
      </div>
    </div>

    <!-- Right: Dashboard Mockup -->
    <div class="hero-visual" aria-hidden="true">

      <div class="mockup-shell">
        <!-- Sidebar strip -->
        <div class="mockup-sidebar">
          <div class="mock-logo-dot"></div>
          <div class="mock-nav-items">
            <div class="mock-nav-item active"></div>
            <div class="mock-nav-item"></div>
            <div class="mock-nav-item"></div>
            <div class="mock-nav-item"></div>
            <div class="mock-nav-item"></div>
          </div>
        </div>

        <!-- Main area -->
        <div class="mockup-main">
          <!-- Header bar -->
          <div class="mock-header">
            <div class="mock-live">
              <span class="live-dot"></span>
              <div class="mock-line short"></div>
            </div>
            <div class="mock-period-btns">
              <div class="mock-period active"></div>
              <div class="mock-period"></div>
              <div class="mock-period"></div>
            </div>
          </div>

          <!-- KPI row -->
          <div class="mock-kpi-row">
            <div class="mock-kpi-card" style="--d:0ms">
              <div class="mock-kpi-label"></div>
              <div class="mock-kpi-value accent"></div>
              <div class="mock-kpi-trend up"></div>
            </div>
            <div class="mock-kpi-card" style="--d:80ms">
              <div class="mock-kpi-label"></div>
              <div class="mock-kpi-value"></div>
              <div class="mock-kpi-trend up"></div>
            </div>
            <div class="mock-kpi-card" style="--d:160ms">
              <div class="mock-kpi-label"></div>
              <div class="mock-kpi-value"></div>
              <div class="mock-kpi-trend down"></div>
            </div>
            <div class="mock-kpi-card" style="--d:240ms">
              <div class="mock-kpi-label"></div>
              <div class="mock-kpi-value"></div>
              <div class="mock-kpi-trend up"></div>
            </div>
          </div>

          <!-- Chart panel -->
          <div class="mock-chart-panel">
            <div class="mock-panel-label"></div>
            <div class="mock-chart">
              <svg viewBox="0 0 320 80" preserveAspectRatio="none" class="mock-svg">
                <defs>
                  <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#E11D6A" stop-opacity="0.35"/>
                    <stop offset="100%" stop-color="#E11D6A" stop-opacity="0"/>
                  </linearGradient>
                </defs>
                <path class="mock-chart-fill" d="M0,60 C20,55 40,40 70,35 C100,30 120,50 150,45 C180,40 200,20 230,18 C260,16 290,22 320,18 L320,80 L0,80 Z" fill="url(#chartGrad)"/>
                <path class="mock-chart-line" d="M0,60 C20,55 40,40 70,35 C100,30 120,50 150,45 C180,40 200,20 230,18 C260,16 290,22 320,18" fill="none" stroke="#E11D6A" stroke-width="2"/>
              </svg>
            </div>
          </div>

          <!-- Bottom row -->
          <div class="mock-bottom-row">
            <div class="mock-mini-panel">
              <div class="mock-panel-label"></div>
              <div class="mock-donut">
                <svg viewBox="0 0 60 60" class="mock-donut-svg">
                  <circle cx="30" cy="30" r="22" fill="none" stroke="rgba(225,29,106,0.15)" stroke-width="10"/>
                  <circle cx="30" cy="30" r="22" fill="none" stroke="#E11D6A" stroke-width="10" stroke-dasharray="50 88" stroke-dashoffset="22" stroke-linecap="round"/>
                  <circle cx="30" cy="30" r="22" fill="none" stroke="rgba(34,197,94,0.6)" stroke-width="10" stroke-dasharray="25 113" stroke-dashoffset="-28" stroke-linecap="round"/>
                  <circle cx="30" cy="30" r="22" fill="none" stroke="rgba(234,179,8,0.7)" stroke-width="10" stroke-dasharray="13 125" stroke-dashoffset="-53" stroke-linecap="round"/>
                </svg>
              </div>
            </div>
            <div class="mock-mini-panel feed">
              <div class="mock-panel-label"></div>
              <div class="mock-feed-rows">
                <div class="mock-feed-row" style="--fd:0ms"></div>
                <div class="mock-feed-row" style="--fd:100ms"></div>
                <div class="mock-feed-row" style="--fd:200ms"></div>
                <div class="mock-feed-row" style="--fd:300ms"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Decorative glow behind mockup -->
      <div class="mockup-glow"></div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="landing-footer">
    <span>Projekt 3 — Nino Bornhausser · 2026</span>
    <span class="footer-sep">·</span>
    <span>Vite + Vanilla JS</span>
  </footer>

</body>
</html>
