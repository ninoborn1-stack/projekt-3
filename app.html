<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storefront — Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/projekt-3/assets/app-B74SqjKp.js"></script>
  <link rel="modulepreload" crossorigin href="/projekt-3/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/projekt-3/assets/app-DK7LrZ07.css">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-logo">
          <span class="logo-mark"></span>
          <span class="logo-text" data-i18n="brand">Storefront</span>
        </div>

        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-view="overview">
            <span class="nav-icon" data-lucide="layout-dashboard"></span>
            <span class="nav-label" data-i18n="nav.overview">Übersicht</span>
          </a>
          <a href="#" class="nav-item" data-view="orders">
            <span class="nav-icon" data-lucide="shopping-cart"></span>
            <span class="nav-label" data-i18n="nav.orders">Bestellungen</span>
          </a>
          <a href="#" class="nav-item" data-view="products">
            <span class="nav-icon" data-lucide="package"></span>
            <span class="nav-label" data-i18n="nav.products">Produkte</span>
          </a>
          <a href="#" class="nav-item" data-view="customers">
            <span class="nav-icon" data-lucide="users"></span>
            <span class="nav-label" data-i18n="nav.customers">Kunden</span>
          </a>
          <a href="#" class="nav-item" data-view="analytics">
            <span class="nav-icon" data-lucide="bar-chart-2"></span>
            <span class="nav-label" data-i18n="nav.analytics">Analytics</span>
          </a>
        </nav>

        <div class="sidebar-bottom">
          <button class="control-btn" id="theme-toggle" aria-label="Toggle theme">
            <span class="nav-icon" data-lucide="sun" id="theme-icon"></span>
          </button>
          <button class="control-btn lang-btn" id="lang-toggle">
            <span class="lang-label" id="lang-label">EN</span>
          </button>
          <div class="sidebar-user">
            <div class="user-avatar">NB</div>
            <span class="user-name">Nino B.</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main content -->
    <div class="main-wrap">
      <!-- Header -->
      <header class="top-header">
        <div class="header-left">
          <button class="mobile-menu-btn" id="mobile-menu-btn">
            <span data-lucide="menu"></span>
          </button>
          <div class="live-indicator">
            <span class="live-dot"></span>
            <span data-i18n="header.live">Live</span>
          </div>
        </div>
        <div class="header-center">
          <h1 class="page-title" data-i18n="header.title">Analytics Übersicht</h1>
        </div>
        <div class="header-right">
          <div class="period-filters">
            <button class="period-btn active" data-period="7">7d</button>
            <button class="period-btn" data-period="30">30d</button>
            <button class="period-btn" data-period="90">90d</button>
          </div>
        </div>
      </header>

      <!-- View container — filled dynamically by JS router -->
      <main class="dashboard" id="main-content"></main>
    </div>
  </div>

</body>
</html>
